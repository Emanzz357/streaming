<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Streaming5BI — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const errore = new URLSearchParams(window.location.search).get('errore');
            if (errore) {
                const el = document.getElementById('errore');
                el.textContent = errore;
                el.style.display = 'block';
            }
        });
    </script>
</head>
<body class="login-page">
    <form action="php/login.php" method="post">
        <h1>Streaming 5BI</h1>
        <p id="errore" style="display:none; color:red; margin:0 0 10px 0;"></p>
        <input class="text" type="text"     name="mail"     placeholder="e-mail">
        <input class="text" type="password" name="password" placeholder="Password">
        <input class="submit" type="submit" value="Accedi">
    </form>
</body>
</html>
